app = "biopulse-bot"
primary_region = "ams"  # Amsterdam — ближе к EU

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  TELEGRAM_MODE = "polling"
  AI_PROVIDER = "openai"

# Бот работает в polling-режиме — HTTP не нужен.
# Один инстанс всегда запущен.
[machines]
  [machines.default]
    memory = "256mb"
    cpus = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[restart]
  policy = "always"
