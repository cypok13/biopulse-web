app = "biopulse-bot"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  TELEGRAM_MODE = "polling"
  AI_PROVIDER = "openai"

# Бот работает в polling-режиме — HTTP не нужен, один инстанс всегда запущен.
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
